interface:
  display_name: "QA Executor"
  short_description: "Run QA with guarded Plane workflow."
  default_prompt: "Use $qa-executor to execute approved QA cases, enforce Plane Ready to Test -> In Testing -> Need Review Test Execute workflow when Plane input is present, require fresh approval after reading Plane state if it is not Ready to Test, update the original source row/item or record a source_update_gap after every executed case even when a handoff/report is present, add redacted curl for failed or blocked API cases, write a Plane terminal result comment when Plane context is active, and produce execution_result.json."
