interface:
  display_name: "QA Executor"
  short_description: "Run QA with guarded Plane parent/sub-work-item workflow."
  default_prompt: "Use $qa-executor to execute approved QA cases, resolve Plane parent and requested sub-work-items when present, enforce Plane Ready to Test -> In Testing -> Need Review Test Execute workflow per executable work item, require fresh approval after reading Plane state if it is not Ready to Test, include sub-work-item readable ids in mapped scenarios, update the original source row/item or record a source_update_gap after every executed case even when a handoff/report is present, add redacted curl for failed or blocked API cases, write terminal Plane comments only on completion/review, suppress redundant free-form review sync comments, and produce execution_result.json with parent_rollup and plane_sub_work_item_executions when sub-work-items are active."
